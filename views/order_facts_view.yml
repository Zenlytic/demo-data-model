version: 1
type: view
name: order_facts
description: Summarized Order Data.
model_name: pure_organics

derived_table:
  sql: >
         select date_trunc('DAY', cast(cast(convert_timezone('America/New_York', order_at) as timestamp_ntz) as timestamp)) as order_date
                ,product_id as product_id
                ,count(distinct order_id) as orders
                ,sum(quantity) as units
                ,sum(revenue) as gross_revenue
         from demo_prod.order_lines
         where DATE_TRUNC('DAY', CAST(CAST(CONVERT_TIMEZONE('America/New_York', ORDER_AT) as TIMESTAMP_NTZ) as TIMESTAMP))>='2024-08-07T00:00:00'
           and DATE_TRUNC('DAY', CAST(CAST(CONVERT_TIMEZONE('America/New_York', ORDER_AT) as TIMESTAMP_NTZ) as TIMESTAMP))<='2024-09-06T23:59:59'
         group by 1, 2

  identifiers:
  - name: order_date
    type: primary
    sql: ${order_date}  
  - name: product_id
    type: foreign
    sql: ${product_id}

  fields:
  - name: order
    field_type: dimension_group
    type: time
    datatype: timestamp
    timeframes:
    - raw
    - date
    - week
    - month
    - quarter
    - year
    - day_of_year
    - week_of_year
    - month_of_year
    sql: ${TABLE}.order_date

  - name: product_id
    field_type: dimension
    type: string
    sql: ${TABLE}.product_id

  - name: total_orders
    field_type: measure
    type: sum
    sql: ${TABLE}.orders

  - name: total_units
    field_type: measure
    type: sum
    sql: ${TABLE}.units

  - name: total_gross_revenue
    field_type: measure
    type: sum
    sql: ${TABLE}.gross_revenue


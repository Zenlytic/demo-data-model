version: 1
type: view
name: order_facts
description: Summarized Order Data.
model_name: pure_organics

derived_table:
  sql: >
    select date_trunc('DAY', cast(cast(convert_timezone('America/New_York', order_lines.order_at) as timestamp_ntz) as timestamp)) as order_date
           ,order_lines.product_id
           ,products.product_title
           ,products.product_type
           ,count(distinct order_lines.order_id) as orders
           ,sum(order_lines.quantity) as units
           ,sum(order_lines.revenue) as gross_revenue
    from demo_prod.order_lines 
    left join: demo_prod.products on products.order_lines = products.products_id
    where DATE_TRUNC('DAY',CAST(CAST(CONVERT_TIMEZONE('America/New_York', ORDER_AT) as TIMESTAMP_NTZ) as TIMESTAMP))>='2024-08-07T00:00:00'
      and DATE_TRUNC('DAY', CAST(CAST(CONVERT_TIMEZONE('America/New_York', ORDER_AT) as TIMESTAMP_NTZ) as TIMESTAMP))<='2024-09-06T23:59:59'
    group by 1, 2

default_date: order
row_label: Order Facts

identifiers:
  - name: order
    type: primary
    sql: ${order_date}
  - name: product_id
    type: foreign
    sql: ${product_id}

fields:
  - name: order
    field_type: dimension_group
    type: time
    datatype: timestamp
    timeframes:
      - raw
      - date
      - week
      - month
      - quarter
      - year
      - day_of_year
      - week_of_year
      - month_of_year
    primary_key: true
    sql: ${TABLE}.order_date

  - name: product_id
    field_type: dimension
    type: string
    sql: ${TABLE}.product_id
    searchable: true

  - name: product_title
    field_type: dimension
    type: string
    sql: ${TABLE}.product_title
    searchable: true

  - name: product_type
    field_type: dimension
    type: string
    sql: ${TABLE}.product_type
    searchable: true

  - name: total_orders
    field_type: measure
    type: sum
    sql: ${TABLE}.orders
    value_format_name: decimal_0

  - name: total_units
    field_type: measure
    type: sum
    sql: ${TABLE}.units
    value_format_name: decimal_0

  - name: total_gross_revenue
    field_type: measure
    type: sum
    sql: ${TABLE}.gross_revenue
    value_format_name: decimal_0

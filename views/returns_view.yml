version: 1
type: view
name: returns
model_name: pure_organics
sql_table_name: DEMO.DEMO_RAW.RETURNS
default_date: order_at
fields:
  - name: product_id
    field_type: dimension
    type: string
    sql: ${TABLE}."PRODUCT_ID"
    searchable: true

  - name: customer_id
    field_type: dimension
    type: number
    sql: ${TABLE}."CUSTOMER_ID"

  - name: order_id
    field_type: dimension
    type: number
    sql: ${TABLE}."ORDER_ID"

  - name: order_line_id
    field_type: dimension
    type: number
    sql: ${TABLE}."ORDER_LINE_ID"

  - name: marketing_source
    field_type: dimension
    type: string
    sql: ${TABLE}."MARKETING_SOURCE"
    searchable: true

  - name: subscription_vs_otp
    field_type: dimension
    type: string
    sql: ${TABLE}."SUBSCRIPTION_VS_OTP"
    searchable: true

  - name: promotion
    field_type: dimension
    type: string
    sql: ${TABLE}."PROMOTION"
    searchable: true

  - name: returned_for_fit
    field_type: dimension
    type: yesno
    sql: ${TABLE}."RETURNED_FOR_FIT"

  - name: marketing_channel
    field_type: dimension
    type: string
    sql: ${TABLE}."MARKETING_CHANNEL"
    searchable: true

  - name: campaign
    field_type: dimension
    type: string
    sql: ${TABLE}."CAMPAIGN"
    searchable: true

  - name: price
    field_type: dimension
    type: number
    sql: ${TABLE}."PRICE"

  - name: quantity
    field_type: dimension
    type: number
    sql: ${TABLE}."QUANTITY"

  - name: discount
    field_type: dimension
    type: number
    sql: ${TABLE}."DISCOUNT"

  - name: revenue
    field_type: dimension
    type: number
    sql: ${TABLE}."REVENUE"

  - name: order_at
    field_type: dimension_group
    type: time
    datatype: timestamp
    timeframes:
      - raw
      - date
      - day_of_year
      - week
      - week_of_year
      - month
      - month_of_year
      - quarter
      - year
    sql: ${TABLE}."ORDER_AT"

  - name: return_at
    field_type: dimension_group
    type: time
    datatype: timestamp
    timeframes:
      - raw
      - date
      - day_of_year
      - week
      - week_of_year
      - month
      - month_of_year
      - quarter
      - year
    sql: ${TABLE}."RETURN_AT"

  - name: Total_Revenue
    field_type: measure
    type: sum
    description: This is the original total sales for all returns that were made
    hidden: false
    sql: ${TABLE}.revenue
    value_format_name: usd_0
